# ESPHome Configuration for Nest Audio PCB
# Home Assistant Voice Assistant

esphome:
  name: nest-audio-voice
  friendly_name: "Nest Audio Voice"
  project:
    name: "yourname.nest-audio-voice"
    version: "0.1.0"
  on_boot:
    - priority: -100
      then:
        - wait_until: api.connected
        - delay: 1s
        - if:
            condition:
              switch.is_on: use_wake_word
            then:
              - voice_assistant.start_continuous:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_AUDIO_BOARD_CUSTOM: "y"

# Enable logging
logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "NestAudio Voice"
    password: !secret wifi_ap_password

captive_portal:
improv_serial:

# Status LED
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO5
    num_leds: 6
    rmt_channel: 0
    chipset: SK6812
    name: "Status LED"
    id: status_led
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Listening"
          transition_length: 0.1s
          update_interval: 0.1s
          min_brightness: 20%
          max_brightness: 100%

# I2S Audio Configuration
i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO12
    i2s_bclk_pin: GPIO13
    i2s_mclk_pin: GPIO14
  - id: i2s_input
    i2s_lrclk_pin: GPIO15
    i2s_bclk_pin: GPIO16

# Speaker output
speaker:
  - platform: i2s_audio
    id: amp_output
    i2s_audio_id: i2s_output
    dac_type: external
    i2s_dout_pin: GPIO11
    mode: mono

# Microphone input
microphone:
  - platform: i2s_audio
    id: mic_array
    i2s_audio_id: i2s_input
    adc_type: external
    i2s_din_pin: GPIO17
    pdm: false
    bits_per_sample: 32bit
    channel: left

# Voice Assistant
voice_assistant:
  id: va
  microphone: mic_array
  speaker: amp_output
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  vad_threshold: 3
  on_listening:
    - light.turn_on:
        id: status_led
        effect: "Listening"
  on_stt_vad_end:
    - light.turn_off: status_led
  on_tts_start:
    - light.turn_on:
        id: status_led
        brightness: 100%
        red: 0%
        green: 100%
        blue: 0%
  on_tts_end:
    - light.turn_off: status_led
  on_error:
    - light.turn_on:
        id: status_led
        brightness: 100%
        red: 100%
        green: 0%
        blue: 0%
    - delay: 1s
    - light.turn_off: status_led

# Wake word settings
switch:
  - platform: template
    name: "Use Wake Word"
    id: use_wake_word
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - lambda: |-          id(va).set_use_wake_word(true);
          if (id(va).is_running()) {
            id(va).stop();
          }
          id(va).start_continuous();
    on_turn_off:
      - lambda: |-          id(va).set_use_wake_word(false);
          if (id(va).is_running()) {
            id(va).stop();
          }

  - platform: template
    name: "Mute"
    id: mute_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
    on_turn_off:
      - if:
          condition:
            switch.is_on: use_wake_word
          then:
            - voice_assistant.start_continuous:

# Buttons
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Boot Button"
    on_press:
      then:
        - button.press: button_reset

# Control buttons
button:
  - platform: restart
    name: "Restart"
    id: button_reset

  - platform: factory_reset
    name: "Factory Reset"
    disabled_by_default: true

  - platform: safe_mode
    name: "Safe Mode Boot"
    disabled_by_default: true

# Sensors
sensor:
  - platform: uptime
    name: "Uptime"
    type: seconds

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

# Text sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "Mac Address"

# Debug
debug:
  update_interval: 5s
